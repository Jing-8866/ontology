# 开发环境配置
environment: "dev"
log_level: "DEBUG"

# 多个模型
ai_api_list:
  # DeepSeek-v4-flash模型
  ds_flash:
    model_name: "deepseek-v4-flash"
    provider: "openai-compatible"
    apiKey: "sk-xxxxxxxxxxxxxxx"
    base_url: "https://api.deepseek.com"
    contextLength: 1000000
    maxTokens: 8192
  
  # DeepSeek-v4-pro模型
  ds_pro:
    model_name: "deepseek-v4-pro"
    provider: "openai-compatible"
    apiKey: "sk-xxxxxxxxxxxxxxx"
    base_url: "https://api.deepseek.com"
    contextLength: 1000000
    maxTokens: 8192
  

# 数据库配置
database:
  mysql:
    host: "<HOST>"
    port: <PORT>
    username: "<USER_NAME>"
    password: "<PASSWORD>"